<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Drone Flights</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<style>
  :root { color-scheme: dark; --toolbar-h: 56px; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, system-ui, sans-serif;
         background: #0d1117; color: #e6edf3; }
  a { color: inherit; }
  header { padding: 18px 24px 10px; display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  header h1 { margin: 0; font-size: 22px; }
  header .sub { color: #7d8590; }
  header .navlink { color: #3fb950; text-decoration: none; font-weight: 500; }
  header .navlink:hover { text-decoration: underline; }
  .summary { margin-left: auto; display: flex; gap: 18px; color: #adbac7; font-size: 13px;
             font-variant-numeric: tabular-nums; flex-wrap: wrap; }
  .summary b { color: #e6edf3; }

  .toolbar { position: sticky; top: 0; z-index: 30; background: rgba(13,17,23,.92);
             backdrop-filter: blur(8px); border-bottom: 1px solid #21262d;
             padding: 10px 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  input, select { background: #161b22; border: 1px solid #30363d; color: #e6edf3;
                  border-radius: 8px; padding: 7px 10px; font: inherit; }
  #q { flex: 1; min-width: 180px; max-width: 340px; }
  .seg { display: inline-flex; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
  .seg button { background: #161b22; border: 0; color: #adbac7; padding: 7px 11px; font: inherit;
                cursor: pointer; border-left: 1px solid #30363d; }
  .seg button:first-child { border-left: 0; }
  .seg button.on { background: #1f6feb; color: #fff; }
  .chip { background: #161b22; border: 1px solid #30363d; color: #adbac7; border-radius: 999px;
          padding: 6px 12px; cursor: pointer; font: inherit; }
  .chip.on { background: #238636; border-color: #2ea043; color: #fff; }
  .count { color: #7d8590; font-size: 13px; margin-left: auto; font-variant-numeric: tabular-nums; }

  #grid { padding: 6px 24px 48px; }
  .group-h { position: sticky; top: var(--toolbar-h); z-index: 10; display: flex; gap: 12px;
             align-items: baseline; padding: 14px 2px 8px; background: #0d1117;
             border-bottom: 1px solid #21262d; margin-bottom: 12px; }
  .group-h .gt { font-size: 16px; font-weight: 600; }
  .group-h .gs { color: #7d8590; font-size: 13px; font-variant-numeric: tabular-nums; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
           gap: 16px; margin-bottom: 26px; }
  a.card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; overflow: hidden;
           text-decoration: none; color: inherit; transition: border-color .15s, transform .15s; display: block; }
  a.card:hover { border-color: #58a6ff; transform: translateY(-2px); }
  .thumb { aspect-ratio: 16/9; background: #000 center/cover no-repeat; position: relative; }
  .thumb .dur { position: absolute; right: 8px; bottom: 8px; background: rgba(0,0,0,.72);
                padding: 2px 7px; border-radius: 6px; font-size: 12px; font-variant-numeric: tabular-nums; }
  .thumb .clips { position: absolute; left: 8px; top: 8px; background: rgba(35,134,54,.92);
                  padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
  .body { padding: 11px 13px; }
  .date { font-weight: 600; }
  .model { color: #7d8590; font-size: 12px; margin-top: 1px; }
  .stats { display: flex; gap: 14px; margin-top: 9px; color: #adbac7; font-size: 12.5px;
           font-variant-numeric: tabular-nums; }
  .stats b { color: #e6edf3; font-weight: 600; }

  #map { display: none; height: calc(100dvh - var(--toolbar-h) - 70px); margin: 10px 24px 24px;
         border-radius: 12px; }
  .leaflet-tile { filter: none; }
  .empty { padding: 48px 24px; color: #7d8590; }
</style>
</head>
<body>
<header>
  <h1>Drone Flights</h1>
  <div class="summary" id="summary"></div>
</header>

<div class="toolbar" id="toolbar">
  <input id="q" placeholder="Search date / model…" />
  <select id="sort" title="Sort">
    <option value="newest">Newest first</option>
    <option value="oldest">Oldest first</option>
    <option value="dist">Longest path</option>
    <option value="alt">Highest altitude</option>
    <option value="dur">Longest duration</option>
  </select>
  <span class="seg" id="group">
    <button data-v="day">Day</button>
    <button data-v="month">Month</button>
    <button data-v="flat">Flat</button>
  </span>
  <span class="seg" id="view">
    <button data-v="grid">Grid</button>
    <button data-v="map">Map</button>
  </span>
  <span class="seg" id="tod">
    <button data-v="all">All</button>
    <button data-v="day">Day</button>
    <button data-v="golden">Golden</button>
    <button data-v="night">Night</button>
  </span>
  <button class="chip" id="clipsOnly">★ Clips only</button>
  <select id="model" title="Model" style="display:none"></select>
  <select id="jump" title="Jump to month"><option value="">Jump to…</option></select>
  <span class="count" id="count"></span>
</div>

<div id="grid"></div>
<div id="map"></div>

<script>
// ---------- helpers ----------
const M_TO_FT = 3.28084, MS_TO_MPH = 2.23694, M_TO_MI = 0.000621371;
const pad2 = n => String(n).padStart(2, '0');
const fmtDur = s => `${Math.floor(s/60)}:${pad2(Math.round(s%60))}`;
const dObj = iso => iso ? new Date(iso) : null;
const fmtDateTime = d => d ? d.toLocaleDateString(undefined,{weekday:'short',year:'numeric',month:'short',day:'numeric'})
  + ' · ' + d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}) : 'Unknown date';
const dayKey = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
const monthKey = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}`;
const fmtDay = d => d.toLocaleDateString(undefined,{weekday:'short',year:'numeric',month:'short',day:'numeric'});
const fmtMonth = d => d.toLocaleDateString(undefined,{year:'numeric',month:'long'});

// approximate solar elevation (deg) for a flight: local wall-clock + longitude-based TZ.
function sunAltDeg(date, lat, lon) {
  const rad = Math.PI/180, J1970 = 2440588, J2000 = 2451545, day = 86400000;
  const d = date.valueOf()/day - 0.5 + J1970 - J2000;
  const e = rad*23.4397;
  const M = rad*(357.5291 + 0.98560028*d);
  const L = M + rad*(1.9148*Math.sin(M) + 0.02*Math.sin(2*M) + 0.0003*Math.sin(3*M)) + rad*102.9372 + Math.PI;
  const dec = Math.asin(Math.sin(e)*Math.sin(L));
  const ra = Math.atan2(Math.sin(L)*Math.cos(e), Math.cos(L));
  const th = rad*(280.16 + 360.9856235*d) - rad*-lon;
  const H = th - ra, phi = rad*lat;
  return Math.asin(Math.sin(phi)*Math.sin(dec) + Math.cos(phi)*Math.cos(dec)*Math.cos(H)) / rad;
}
function timeOfDay(f) {
  if (!f.centroid || !f._d) return 'day';
  const m = /^(\d+)-(\d+)-(\d+)T(\d+):(\d+):(\d+)/.exec(f.date);
  if (!m) return 'day';
  const [, Y, Mo, D, h, mi, s] = m.map(Number);
  const tz = Math.round(f.centroid.lon / 15);                 // rough offset from UTC
  const utc = new Date(Date.UTC(Y, Mo-1, D, h - tz, mi, s));
  const alt = sunAltDeg(utc, f.centroid.lat, f.centroid.lon);
  return alt >= 6 ? 'day' : alt < -4 ? 'night' : 'golden';
}

// ---------- state (persisted) ----------
const DEFAULTS = { q:'', sort:'newest', group:'day', view:'grid', tod:'all', clipsOnly:false, model:'all' };
let state = { ...DEFAULTS };
try { Object.assign(state, JSON.parse(localStorage.getItem('df_gallery') || '{}')); } catch {}
const save = () => localStorage.setItem('df_gallery', JSON.stringify(state));

let FLIGHTS = [], CLIPS = {};

// ---------- data ----------
(async function () {
  let man, clips;
  try { man = await (await fetch('manifest.json')).json(); } catch { man = { flights: [] }; }
  try { clips = await (await fetch('api/clips')).json(); } catch { clips = { clips: [] }; }
  (clips.clips || []).forEach(c => { CLIPS[c.flightId] = (CLIPS[c.flightId] || 0) + 1; });
  FLIGHTS = (man.flights || []).map(f => {
    f._d = dObj(f.date);
    f._tod = timeOfDay(f);
    f._clips = CLIPS[f.id] || 0;
    return f;
  });
  if (!FLIGHTS.length) {
    document.getElementById('grid').innerHTML =
      `<div class="empty"><h3>No flights yet</h3><p>Import some with <code>./add-flights.sh</code>, then refresh.</p></div>`;
    return;
  }
  buildSummary();
  buildModelOptions();
  wireControls();
  applyStateToControls();
  render();
})();

function buildSummary() {
  const n = FLIGHTS.length;
  const secs = FLIGHTS.reduce((a,f)=>a+(f.duration||0),0);
  const mi = FLIGHTS.reduce((a,f)=>a+(f.pathLength||0),0)*M_TO_MI;
  const dates = FLIGHTS.map(f=>f._d).filter(Boolean).sort((a,b)=>a-b);
  const span = dates.length ? `${dates[0].toLocaleDateString(undefined,{month:'short',year:'numeric'})} – ${dates[dates.length-1].toLocaleDateString(undefined,{month:'short',year:'numeric'})}` : '';
  const h = Math.floor(secs/3600), m = Math.round((secs%3600)/60);
  document.getElementById('summary').innerHTML =
    `<span><b>${n}</b> flights</span><span><b>${h}h ${m}m</b> airtime</span>` +
    `<span><b>${mi.toFixed(0)}</b> mi</span><span>${span}</span>`;
}

function buildModelOptions() {
  const models = [...new Set(FLIGHTS.map(f=>(f.model||'').trim()).filter(Boolean))];
  const sel = document.getElementById('model');
  if (models.length <= 1) return;
  sel.style.display = '';
  sel.innerHTML = `<option value="all">All models</option>` + models.map(m=>`<option value="${m}">${m}</option>`).join('');
}

// ---------- filtering / sorting / grouping ----------
function filtered() {
  const q = state.q.toLowerCase();
  return FLIGHTS.filter(f => {
    if (q && !((fmtDateTime(f._d)+' '+(f.model||'')+' '+f.id).toLowerCase().includes(q))) return false;
    if (state.tod !== 'all' && f._tod !== state.tod) return false;
    if (state.clipsOnly && !f._clips) return false;
    if (state.model !== 'all' && (f.model||'').trim() !== state.model) return false;
    return true;
  });
}
const cmp = {
  newest: (a,b)=>(b._d||0)-(a._d||0),
  oldest: (a,b)=>(a._d||0)-(b._d||0),
  dist:   (a,b)=>b.pathLength-a.pathLength,
  alt:    (a,b)=>(b.relAlt?.max||0)-(a.relAlt?.max||0),
  dur:    (a,b)=>b.duration-a.duration,
};

function render() {
  const grid = document.getElementById('grid'), mapEl = document.getElementById('map');
  const list = filtered().sort(cmp[state.sort]);
  document.getElementById('count').textContent =
    `${list.length}${list.length!==FLIGHTS.length?` / ${FLIGHTS.length}`:''} shown`;

  document.getElementById('jump').style.display = (state.view==='grid' && state.group!=='flat') ? '' : 'none';

  if (state.view === 'map') { grid.style.display='none'; mapEl.style.display='block'; renderMap(list); return; }
  mapEl.style.display='none'; grid.style.display='block';

  if (state.group === 'flat') {
    grid.innerHTML = `<div class="cards">${list.map(card).join('')}</div>`;
    populateJump([]); return;
  }
  // group by day or month
  const keyFn = state.group==='day' ? (f=>dayKey(f._d)) : (f=>monthKey(f._d));
  const labelFn = state.group==='day' ? (f=>fmtDay(f._d)) : (f=>fmtMonth(f._d));
  const groups = new Map();
  list.forEach(f => { const k=keyFn(f); if(!groups.has(k)) groups.set(k,{label:labelFn(f),items:[]}); groups.get(k).items.push(f); });
  const ordered = [...groups.entries()].sort((a,b)=> state.sort==='oldest' ? a[0].localeCompare(b[0]) : b[0].localeCompare(a[0]));
  grid.innerHTML = ordered.map(([k,g]) => {
    const secs = g.items.reduce((a,f)=>a+(f.duration||0),0);
    const mi = g.items.reduce((a,f)=>a+(f.pathLength||0),0)*M_TO_MI;
    const mins = Math.round(secs/60);
    return `<section><div class="group-h" id="grp-${k}">
        <span class="gt">${g.label}</span>
        <span class="gs">${g.items.length} flight${g.items.length>1?'s':''} · ${mins} min · ${mi.toFixed(2)} mi</span>
      </div><div class="cards">${g.items.map(card).join('')}</div></section>`;
  }).join('');
  populateJump(ordered.map(([k,g]) => [k, g.label]));
}

function card(f) {
  const clip = f._clips ? `<span class="clips">★ ${f._clips}</span>` : '';
  return `<a class="card" href="player.html?id=${encodeURIComponent(f.id)}">
    <div class="thumb" style="background-image:url('flights/${f.id}/${f.thumb}')">
      ${clip}<span class="dur">${fmtDur(f.duration)}</span>
    </div>
    <div class="body">
      <div class="date">${fmtDateTime(f._d)}</div>
      <div class="model">${(f.model||'DJI').trim()}</div>
      <div class="stats">
        <span><b>${(f.pathLength*M_TO_MI).toFixed(2)}</b> mi</span>
        <span><b>${f.relAlt?Math.round(f.relAlt.max*M_TO_FT):'–'}</b> ft alt</span>
        <span><b>${Math.round(f.maxSpeed*MS_TO_MPH)}</b> mph</span>
      </div>
    </div></a>`;
}

// ---------- jump-to-month ----------
function populateJump(groups) {
  const sel = document.getElementById('jump');
  // collapse to distinct months, point each at its first group on screen
  const seen = new Set(), opts = [];
  groups.forEach(([k,label]) => {
    const mk = k.slice(0,7);
    if (!seen.has(mk)) { seen.add(mk); opts.push([k, state.group==='month' ? label : label.replace(/^.*?,\s*/,'')]); }
  });
  sel.innerHTML = `<option value="">Jump to…</option>` +
    opts.map(([k,l]) => `<option value="grp-${k}">${l}</option>`).join('');
}

// ---------- map ----------
let map, cluster;
function renderMap(list) {
  if (!map) {
    map = L.map('map', { attributionControl:false });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:20}).addTo(map);
    cluster = L.markerClusterGroup({ maxClusterRadius: 45 });
    map.addLayer(cluster);
  }
  cluster.clearLayers();
  const pts = [];
  list.forEach(f => {
    if (!f.centroid) return;
    const ll = [f.centroid.lat, f.centroid.lon]; pts.push(ll);
    const m = L.circleMarker(ll, { radius:6, color:'#1f6feb', fillColor:'#58a6ff', fillOpacity:.9, weight:2 });
    m.bindTooltip(`${fmtDateTime(f._d)} · ${(f.pathLength*M_TO_MI).toFixed(2)} mi${f._clips?` · ★${f._clips}`:''}`);
    m.on('click', () => { location.href = `player.html?id=${encodeURIComponent(f.id)}`; });
    cluster.addLayer(m);
  });
  setTimeout(() => { map.invalidateSize(); if (pts.length) map.fitBounds(pts, { padding:[40,40], maxZoom:14 }); }, 0);
}

// ---------- controls ----------
function seg(id) {
  document.querySelectorAll(`#${id} button`).forEach(b =>
    b.addEventListener('click', () => { state[id] = b.dataset.v; save(); applyStateToControls(); render(); }));
}
function wireControls() {
  document.getElementById('q').addEventListener('input', e => { state.q=e.target.value; save(); render(); });
  document.getElementById('sort').addEventListener('change', e => { state.sort=e.target.value; save(); render(); });
  document.getElementById('model').addEventListener('change', e => { state.model=e.target.value; save(); render(); });
  document.getElementById('clipsOnly').addEventListener('click', () => { state.clipsOnly=!state.clipsOnly; save(); applyStateToControls(); render(); });
  document.getElementById('jump').addEventListener('change', e => {
    const el = e.target.value && document.getElementById(e.target.value);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
    e.target.value = '';
  });
  ['group','view','tod'].forEach(seg);
  // keep --toolbar-h accurate even when the toolbar wraps to 2 rows (iPad/narrow)
  new ResizeObserver(setToolbarH).observe(document.getElementById('toolbar'));
  window.addEventListener('resize', () => { if (map) map.invalidateSize(); });
}
function applyStateToControls() {
  document.getElementById('q').value = state.q;
  document.getElementById('sort').value = state.sort;
  document.getElementById('model').value = state.model;
  document.getElementById('clipsOnly').classList.toggle('on', state.clipsOnly);
  ['group','view','tod'].forEach(id =>
    document.querySelectorAll(`#${id} button`).forEach(b => b.classList.toggle('on', b.dataset.v===state[id])));
  setToolbarH();
}
function setToolbarH() {
  document.documentElement.style.setProperty('--toolbar-h', document.getElementById('toolbar').offsetHeight + 'px');
}
</script>
</body>
</html>
