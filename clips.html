<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Clips · Drone Flights</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, system-ui, sans-serif;
         background: #0d1117; color: #e6edf3; }
  header { padding: 22px 28px 10px; display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  header h1 { margin: 0; font-size: 22px; }
  header a.back { color: #58a6ff; text-decoration: none; font-weight: 500; }
  header .sub { color: #7d8590; }
  header .tot { margin-left: auto; color: #7d8590; font-variant-numeric: tabular-nums; }
  .controls { padding: 0 28px 14px; display: flex; gap: 10px; align-items: center; }
  input, select { background: #161b22; border: 1px solid #21262d; color: #e6edf3;
                  border-radius: 8px; padding: 7px 10px; font: inherit; }
  input { flex: 1; max-width: 360px; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
          gap: 16px; padding: 0 28px 40px; }
  a.card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; overflow: hidden;
           text-decoration: none; color: inherit; transition: border-color .15s, transform .15s; display: block; }
  a.card:hover { border-color: #3fb950; transform: translateY(-2px); }
  .thumb { aspect-ratio: 16/9; background: #000 center/cover no-repeat; position: relative; }
  .thumb .rng { position: absolute; right: 8px; bottom: 8px; background: rgba(35,134,54,.9);
                padding: 2px 8px; border-radius: 6px; font-size: 12px; font-variant-numeric: tabular-nums;
                display: flex; gap: 5px; align-items: center; }
  .body { padding: 11px 13px; }
  .lbl { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meta { color: #7d8590; font-size: 12.5px; margin-top: 3px; }
  .empty { padding: 56px 28px; color: #7d8590; max-width: 680px; }
  .empty code { background: #161b22; padding: 2px 7px; border-radius: 6px; color: #e6edf3; }
</style>
</head>
<body>
<header>
  <a class="back" href="index.html">← Flights</a>
  <h1>Clips</h1>
  <span class="sub">your marked highlights</span>
  <span class="tot" id="tot"></span>
</header>
<div class="controls" id="controls" style="display:none">
  <input id="q" placeholder="Search by label or date…" />
  <select id="sort">
    <option value="date">Newest flight first</option>
    <option value="date_asc">Oldest flight first</option>
    <option value="long">Longest clip</option>
    <option value="short">Shortest clip</option>
  </select>
</div>
<div id="grid"></div>

<script>
const fmtClock = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
const fmtDate = iso => {
  if (!iso) return 'Unknown date';
  const d = new Date(iso);
  return d.toLocaleDateString(undefined,{weekday:'short',year:'numeric',month:'short',day:'numeric'})
       + ' · ' + d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
};

let CLIPS = [];
function render() {
  const q = document.getElementById('q').value.toLowerCase();
  const sort = document.getElementById('sort').value;
  let list = CLIPS.filter(c =>
    !q || ((c.label||'') + ' ' + fmtDate(c.date)).toLowerCase().includes(q));
  const dur = c => (c.out - c.in);
  ({
    date: () => list.sort((a,b)=>(b.date||'').localeCompare(a.date||'') || a.in-b.in),
    date_asc: () => list.sort((a,b)=>(a.date||'').localeCompare(b.date||'') || a.in-b.in),
    long: () => list.sort((a,b)=>dur(b)-dur(a)),
    short: () => list.sort((a,b)=>dur(a)-dur(b)),
  })[sort]();
  document.getElementById('grid').innerHTML = list.map(c => `
    <a class="card" href="player.html?id=${encodeURIComponent(c.flightId)}&clip=${encodeURIComponent(c.clipId)}">
      <div class="thumb" style="background-image:url('${c.thumb}')">
        <span class="rng">▶ ${fmtClock(c.in)}–${fmtClock(c.out)} · ${(c.out-c.in).toFixed(0)}s</span>
      </div>
      <div class="body">
        <div class="lbl">${c.label ? c.label.replace(/</g,'&lt;') : 'Untitled clip'}</div>
        <div class="meta">${fmtDate(c.date)}</div>
      </div>
    </a>`).join('');
}

(async function () {
  let data;
  try { data = await (await fetch('api/clips')).json(); }
  catch { data = { clips: [] }; }
  CLIPS = data.clips || [];
  document.getElementById('tot').textContent =
    CLIPS.length ? `${CLIPS.length} clip${CLIPS.length>1?'s':''}` : '';
  if (!CLIPS.length) {
    document.getElementById('grid').innerHTML =
      `<div class="empty"><h3>No clips yet</h3>
       <p>Open any flight, scrub to a good moment, press <code>I</code> then <code>O</code> to
       mark in/out, give it a name and Save. Your highlights will collect here.</p></div>`;
    return;
  }
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('q').addEventListener('input', render);
  document.getElementById('sort').addEventListener('change', render);
  render();
})();
</script>
</body>
</html>
